<div class="min-h-screen flex items-center justify-center bg-[#0a0a0a] text-white relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 blur-[120px] rounded-full pointer-events-none"></div>

  <div class="z-10 w-full max-w-md p-8 bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">Welcome Back</h2>
      <p class="text-gray-400 mt-2">Sign in with your TMDB account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-6">
      
      <!-- Error Message -->
      <div *ngIf="errorMessage" class="p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm text-center animate-fade-in">
        {{ errorMessage }}
      </div>

      <!-- Username Input -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
        <div class="relative">
          <input 
            id="username" 
            type="text" 
            formControlName="username" 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300"
            placeholder="Enter your TMDB username"
          >
        </div>
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="text-red-400 text-xs mt-2 pl-1">
          Username is required.
        </div>
      </div>

      <!-- Password Input -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
        <div class="relative">
          <input 
            id="password" 
            type="password" 
            formControlName="password" 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all duration-300"
            placeholder="Enter your password"
          >
        </div>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-400 text-xs mt-2 pl-1">
          Password is required.
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="isLoading"
        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-medium py-3 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(37,99,235,0.3)]"
      >
        <span *ngIf="isLoading" class="animate-spin h-5 w-5 border-2 border-white/20 border-t-white rounded-full"></span>
        {{ isLoading ? 'Signing In...' : 'Sign In' }}
      </button>

      <div class="text-center mt-6">
        <p class="text-sm text-gray-400">
          Don't have an account? 
          <a href="https://www.themoviedb.org/signup" target="_blank" class="text-blue-400 hover:text-blue-300 transition-colors">Sign up on TMDB</a>
        </p>
      </div>
    </form>
  </div>
</div>
