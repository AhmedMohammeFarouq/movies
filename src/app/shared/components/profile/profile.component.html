<div class="p-10">

  <div class="flex items-center gap-5">

    <img
      class="w-24 rounded-full"
      [src]="'https://image.tmdb.org/t/p/w500' + authService.user()?.avatar?.tmdb?.avatar_path"
    >

    <div>

      <h1 class="text-3xl font-bold">
        {{authService.user()?.username}}
      </h1>

      <button
        (click)="authService.logout()"
        class="bg-red-600 text-white px-5 py-2 rounded-lg mt-3"
      >
        Logout
      </button>

    </div>

  </div>

</div>
