<section class="bg-[#032541] py-12 px-6 md:px-14 overflow-hidden">
  <!-- Header -->
  <div class="max-w-8xl mx-auto">
    <div class="flex items-center gap-6 mb-10">
      <h2 class="text-2xl font-bold text-white">Latest Trailers</h2>

      <!-- Tabs -->
      <div class="flex items-center border border-cyan-400 rounded-full overflow-hidden">
        <button
          (click)="changeTab('popular')"
          class="px-4 py-1 text-xl rounded-full font-semibold transition-all duration-300"
          [class]="
            activeTab() === 'popular'
              ? 'bg-linear-to-r from-green-300 to-cyan-400 text-[#032541]'
              : 'text-white'
          "
        >
          Popular
        </button>

        <button
          (click)="changeTab('streaming')"
          class="px-4 py-1 text-xl rounded-full font-semibold"
          [class]="
            activeTab() === 'streaming'
              ? 'bg-linear-to-r from-green-300 to-cyan-400 text-[#032541]'
              : 'text-white'
          "
        >
          Streaming
        </button>

        <button
          (click)="changeTab('tv')"
          class="px-4 py-1 text-xl rounded-full font-semibold"
          [class]="
            activeTab() === 'tv'
              ? 'bg-linear-to-r from-green-300 to-cyan-400 text-[#032541]'
              : 'text-white'
          "
        >
          On TV
        </button>

        <button
          (click)="changeTab('rent')"
          class="px-4 py-1 text-xl rounded-full font-semibold"
          [class]="
            activeTab() === 'rent'
              ? 'bg-linear-to-r from-green-300 to-cyan-400 text-[#032541]'
              : 'text-white'
          "
        >
          For Rent
        </button>

        <button
          (click)="changeTab('theaters')"
          class="px-4 py-1 text-xl rounded-full font-semibold"
          [class]="
            activeTab() === 'theaters'
              ? 'bg-linear-to-r from-green-300 to-cyan-400 text-[#032541]'
              : 'text-white'
          "
        >
          In Theaters
        </button>
      </div>
    </div>
    <!-- Cards -->
    <div class="flex gap-6 overflow-x-auto overflow-y-hidden pb-6">
      @for (movie of movies(); track movie.id) {
        <div class="min-w-92.5 shrink-0 group cursor-pointer" [routerLink]="['/show-latest-trailers', movie.id]">
          <!-- Image -->
          <div class="relative overflow-hidden rounded-xl">
            <img
              [src]="'https://image.tmdb.org/t/p/original' + movie.backdrop_path"
              class="w-full h-52.5 object-cover rounded-xl transition-transform duration-500 group-hover:scale-105"
            />

            <!-- Overlay -->
            <div class="absolute inset-0 bg-black/10 group-hover:bg-black/30 duration-300"></div>

            <!-- Play -->
            <div class="absolute inset-0 flex items-center justify-center">
              <div
                class="w-20 h-20 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center group-hover:scale-110 duration-300"
              >
                <i class="fa-solid fa-play text-white text-5xl ml-2"></i>
              </div>
            </div>

            <!-- Menu -->
            <button
              (click)="toggleMenu(movie.id)"
              class="absolute top-3 right-3 bg-white/90 w-10 h-10 rounded-full flex items-center justify-center text-xl font-bold hover:bg-white"
            >
              •••
            </button>

            <!-- Dropdown -->
            @if (openMenu === movie.id) {
              <div
                class="absolute w-35 top-14 right-3 bg-white rounded-xl shadow-2xl overflow-hidden z-50"
              >
                <button class="w-full text-left px-3 py-2 hover:bg-gray-100 text-sm">
                  <i class="fa-solid fa-list"></i> Add to list
                </button>

                <button class="w-full text-left px-3 py-2 hover:bg-gray-100 text-sm">
                  <i class="fa-solid fa-heart"></i> Favorite
                </button>

                <button class="w-full text-left px-3 py-2 hover:bg-gray-100 text-sm">
                  <i class="fa-solid fa-bookmark"></i> Watchlist
                </button>

                <button class="w-full text-left px-3 py-2 hover:bg-gray-100 text-sm">
                  <i class="fa-solid fa-star"></i> Your rating
                </button>
              </div>
            }
          </div>

          <!-- Info -->
          <div class="text-center mt-4">
            <h3
              class="text-white text-lg font-bold leading-tight hover:text-[#01B4E4] duration-300"
            >
              {{ movie.title || movie.name }}
            </h3>

            <p class="text-white text-sm">{{ movie.overview?.slice(0, 35) }}...</p>
          </div>
        </div>
      }

    </div>
  </div>
</section>
