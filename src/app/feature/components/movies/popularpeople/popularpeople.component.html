<section class="container mx-auto px-4 py-8">
  <h2 class="text-4xl font-bold mb-8">Popular People</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
    @for (person of peopleList; track person.id) {
      <div
        routerLink="/person_id/{{ person.id }}"
        [queryParams]="{
          image: person.profile_path,
          name: person.name,
        }"
        class="bg-white rounded-lg overflow-hidden shadow-md hover:shadow-xl transition-all duration-300 cursor-pointer"
      >
        <img
          [src]="'https://image.tmdb.org/t/p/w500' + person.profile_path"
          [alt]="person.name"
          class="w-full h-95 object-cover"
        />

        <div class="p-4">
          <h3 class="text-2xl font-semibold mb-2">
            {{ person.name }}
          </h3>

          <p class="text-gray-500 text-sm leading-6">
            @for (movie of person.known_for.slice(0, 3); track $index) {
              {{ movie.title || movie.name }}

              @if ($index < person.known_for.slice(0, 3).length - 1) {
                ,
              }
            }
          </p>
        </div>
      </div>
    }
  </div>
</section>
